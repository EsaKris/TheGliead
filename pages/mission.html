<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mission — Gilead</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(!Auth.guard())return;
  renderPage('mission','Our Mission','The Gilead Project — Technology serving humanity',`
  <div style="max-width:820px;margin:0 auto;padding:0 16px">
    <div class="glass-em fade-up" style="padding:40px 20px;position:relative;overflow:hidden;margin-bottom:18px">
      <div class="orb" style="width:300px;height:300px;background:rgba(16,185,129,.05);right:-80px;top:-80px"></div>
      <div style="text-align:center;position:relative;z-index:1;margin-bottom:40px">
        <div style="width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--emerald),#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 30px var(--em-glow)">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="tag" style="margin-bottom:16px">Gilead Rural Health Connect</div>
        <h2 style="font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.4rem);font-weight:800;line-height:1.18;margin-bottom:18px">Our Mission Statement</h2>
        <div style="width:60px;height:3px;background:var(--emerald);margin:0 auto;border-radius:99px"></div>
      </div>

      <blockquote style="font-style:italic;font-size:clamp(1rem,4vw,1.2rem);line-height:1.82;text-align:center;color:rgba(240,253,244,.78);max-width:580px;margin:0 auto 44px;position:relative;z-index:1">
        "Technology can and must serve humanity — not just those in cities with fast internet, but every person, in every village, in every corner of the world. Wellness awareness is not a luxury. It is a right."
      </blockquote>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;position:relative;z-index:1">
        ${[
          ['🌱','Our Vision','A world where every rural community has access to basic wellness information, preventive health education, and simple digital tools to improve quality of life.'],
          ['💚','Our Commitment','Building tools that are accessible, privacy-respecting, culturally sensitive, and genuinely useful to communities historically underserved by healthcare systems.'],
          ['🏥','What We Do','Wellness assessments, BMI calculators, health education tips, emergency response simulation, location awareness, and community health analytics.'],
          ['⚠️','Important Notice','This is a PROTOTYPE demonstration platform. It does not provide real medical advice, emergency services, or health diagnoses. Always consult qualified healthcare professionals.']
        ].map(([icon,title,desc])=>`
        <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-md);padding:20px">
          <div style="font-size:1.5rem;margin-bottom:8px">${icon}</div>
          <div style="font-weight:700;font-size:14px;color:var(--em-light);margin-bottom:8px">${title}</div>
          <p style="font-size:13px;color:var(--muted);line-height:1.7">${desc}</p>
        </div>`).join('')}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px" class="fade-up d1">
      ${[['12K+','Users Reached'],['340','Communities'],['98%','Satisfaction'],['35','Tips Library']].map(([n,l])=>`
      <div class="glass" style="padding:20px;text-align:center">
        <div style="font-family:'Syne',sans-serif;font-size:clamp(1.5rem,4vw,2rem);font-weight:800;color:var(--em-light)">${n}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${l}</div>
      </div>`).join('')}
    </div>

    <div class="alert alert-warning fade-up d2" style="margin-top:14px;font-size:clamp(11px,3vw,12px);line-height:1.7">
      ⚠️ <strong>Prototype Disclaimer:</strong> The Gilead Rural Health Connect is a prototype exhibition platform. All data is simulated. Emergency features do not contact real services. Health metrics are educational indicators only — not medical diagnoses. Always consult qualified healthcare professionals for medical guidance.
    </div>
  </div>
  `);
});
</script>
</body></html>
