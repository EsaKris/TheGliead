<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- PRIMARY SEO (ENHANCED) -->
  <title>Community Health Analytics — Gilead Rural Health Dashboard</title>
  <meta name="description" content="Privacy-first community health analytics for rural areas. View anonymized BMI trends, wellness indicators, and population health insights — all offline-capable." />
  <meta name="keywords" content="rural health analytics, community BMI tracker, population health dashboard, offline health data, Gilead analytics, village health metrics" />
  <meta name="author" content="Gilead Foundation" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://thegilead.vercel.app/analytics/" />
  
  <!-- OPEN GRAPH / SOCIAL (makes shared links look professional) -->
  <meta property="og:title" content="Gilead Community Health Analytics" />
  <meta property="og:description" content="Real-time aggregated health metrics for rural communities — BMI distribution, wellness trends & privacy-first local data." />
  <meta property="og:image" content="https://thegilead.vercel.app/img/analytics-preview.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://thegilead.vercel.app/analytics/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Gilead Rural Health" />
  
  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@gilead_fdn" />
  <meta name="twitter:title" content="Gilead Rural Health Analytics" />
  <meta name="twitter:description" content="Population health dashboard designed for rural, low-connectivity settings." />
  <meta name="twitter:image" content="https://thegilead.vercel.app/img/analytics-twitter.jpg" />
  
  <!-- FAVICON (matches main site for brand consistency) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='10' fill='%23052e16'/><line x1='20' y1='8' x2='20' y2='32' stroke='%234ade80' stroke-width='3' stroke-linecap='round'/><line x1='8' y1='20' x2='32' y2='20' stroke='%234ade80' stroke-width='3' stroke-linecap='round'/></svg>" />
  
  <!-- TAILWIND + CHART.JS (already present) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- ADDITIONAL FONTS (improves readability & design) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Syne:wght@400..800&display=swap" rel="stylesheet" />
  
  <!-- MAIN CSS (ensure path is correct relative to this page) -->
  <link rel="stylesheet" href="../css/main.css" />
  
  <!-- STRUCTURED DATA (Dataset + WebPage) — tells search engines this is a data dashboard -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Dataset",
    "name": "Gilead Rural Community Health Analytics",
    "description": "Anonymized, aggregated health indicators from rural populations using Gilead wellness tools. Includes BMI distribution, health tip engagement, and demographic trends.",
    "url": "https://thegilead.vercel.app/analytics/",
    "isAccessibleForFree": true,
    "license": "https://opensource.org/licenses/MIT",
    "temporalCoverage": "2023-2026",
    "spatialCoverage": "Rural India",
    "creator": {
      "@type": "Organization",
      "name": "Gilead Foundation",
      "url": "https://thegilead.vercel.app/"
    },
    "distribution": [
      {
        "@type": "DataDownload",
        "encodingFormat": "text/csv",
        "contentUrl": "https://thegilead.vercel.app/data/sample-analytics.csv"
      }
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Gilead Community Health Analytics Dashboard",
    "description": "Real-time population health metrics for rural communities — offline first, privacy preserving.",
    "isPartOf": {
      "@type": "WebSite",
      "name": "Gilead Rural Health",
      "url": "https://thegilead.vercel.app/"
    }
  }
  </script>
</head>
<body>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(!Auth.guard())return;
  renderPage('analytics','Community Analytics','Simulated rural health data across regions',`
  <div style="max-width:1100px;padding:0 12px">
    <div style="display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px;@media(min-width:768px){grid-template-columns:1fr 1fr}">
      <div class="glass fade-up" style="padding:22px">
        <h4 style="font-weight:700;font-size:14px;margin-bottom:4px">Wellness Distribution</h4>
        <p style="font-size:11px;color:var(--text3);margin-bottom:16px">Community wellness across 6 rural zones</p>
        <div style="height:200px;@media(min-width:768px){height:250px};position:relative"><canvas id="c1"></canvas></div>
      </div>
      <div class="glass fade-up d1" style="padding:22px">
        <h4 style="font-weight:700;font-size:14px;margin-bottom:4px">Health Category Awareness</h4>
        <p style="font-size:11px;color:var(--text3);margin-bottom:16px">Tips accessed per health category (%)</p>
        <div style="height:200px;@media(min-width:768px){height:250px};position:relative"><canvas id="c2"></canvas></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr;gap:16px;@media(min-width:768px){grid-template-columns:1fr 2fr}">
      <div class="glass fade-up d2" style="padding:22px">
        <h4 style="font-weight:700;font-size:14px;margin-bottom:4px">Monthly Engagement</h4>
        <p style="font-size:11px;color:var(--text3);margin-bottom:16px">Active users over 12 months</p>
        <div style="height:200px;@media(min-width:768px){height:220px};position:relative"><canvas id="c3"></canvas></div>
      </div>
      <div class="glass fade-up d3" style="padding:22px">
        <h4 style="font-weight:700;font-size:14px;margin-bottom:4px">BMI Distribution Across Communities</h4>
        <p style="font-size:11px;color:var(--text3);margin-bottom:16px">Aggregated BMI category spread (%)</p>
        <div style="height:200px;@media(min-width:768px){height:220px};position:relative"><canvas id="c4"></canvas></div>
      </div>
    </div>
  </div>
  `);

  const G={text:'rgba(240,253,244,.45)',grid:'rgba(255,255,255,.05)'};
  const cfg=(type)=>({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:G.text,font:{family:'Instrument Sans',size:11},boxWidth:12,padding:12}}},
    ...(type!=='doughnut'?{scales:{x:{ticks:{color:G.text,font:{family:'Instrument Sans',size:10}},grid:{color:G.grid}},y:{ticks:{color:G.text,font:{family:'Instrument Sans',size:10}},grid:{color:G.grid}}}}:{})});

  new Chart(document.getElementById('c1'),{type:'bar',data:{
    labels:['Zone A','Zone B','Zone C','Zone D','Zone E','Zone F'],
    datasets:[
      {label:'Good',data:[45,32,58,67,41,53],backgroundColor:'rgba(16,185,129,.75)',borderRadius:6},
      {label:'Moderate',data:[30,45,25,20,38,30],backgroundColor:'rgba(245,158,11,.7)',borderRadius:6},
      {label:'Low',data:[25,23,17,13,21,17],backgroundColor:'rgba(239,68,68,.65)',borderRadius:6}
    ]},options:{...cfg('bar')}});

  new Chart(document.getElementById('c2'),{type:'doughnut',data:{
    labels:['Hydration','Nutrition','Hygiene','Mental Health','Rural Health'],
    datasets:[{data:[28,22,18,20,12],backgroundColor:['#3b82f6','#10b981','#8b5cf6','#f59e0b','#34d399'],borderWidth:0,hoverOffset:8}]
  },options:{...cfg('doughnut'),cutout:'65%'}});

  new Chart(document.getElementById('c3'),{type:'line',data:{
    labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    datasets:[{label:'Users',data:[850,1100,1350,1200,1600,2100,2400,2800,3200,3600,4100,4800],
      borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.07)',fill:true,tension:.42,
      pointRadius:4,pointBackgroundColor:'#10b981',pointBorderColor:'#050e08',pointBorderWidth:2}]
  },options:{...cfg('line'),plugins:{legend:{display:false}}}});

  new Chart(document.getElementById('c4'),{type:'bar',data:{
    labels:['Underweight\n<18.5','Normal\n18.5–24.9','Overweight\n25–29.9','Obese I\n30–34.9','Obese II\n35+'],
    datasets:[{label:'Community %',data:[8,42,28,14,8],
      backgroundColor:['#60a5fa','#10b981','#f59e0b','#f97316','#ef4444'],
      borderRadius:8,borderSkipped:false}]
  },options:{...cfg('bar'),plugins:{legend:{display:false}},
    scales:{x:{ticks:{maxRotation:0,color:G.text},grid:{display:false}},y:{ticks:{callback:v=>v+'%',color:G.text},grid:{color:G.grid}}}}});
});
</script>
</body></html>
